<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stock Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto; }
  .pulse-ok { animation: pulse-bg 1s ease; }
  @keyframes pulse-bg { 0% { background:#fef9c3 } 100% { background:transparent } }
  /* Smooth score bar */
  .score-bar { transition: width 0.4s ease; }
  /* Sticky table headers */
  thead th { position: sticky; top: 0; background: white; z-index: 1; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">
<div class="max-w-7xl mx-auto p-4">

  <!-- Header -->
  <header class="flex flex-wrap items-center gap-3 mb-4">
    <h1 class="text-2xl font-bold">Stock Tracker</h1>
    <span id="status" class="text-xs text-slate-500"></span>
    <div class="ml-auto flex flex-wrap gap-2 items-center">
      <label class="text-sm">Duration:</label>
      <select id="duration" class="border rounded px-2 py-1 text-sm bg-white">
        <option value="1d">1 Day</option>
        <option value="2d">2 Days</option>
        <option value="1w">1 Week</option>
        <option value="1m">1 Month</option>
        <option value="3m">3 Months</option>
        <option value="ytd">YTD</option>
        <option value="1y">1 Year</option>
      </select>
      <input id="search" type="search" placeholder="Search ticker or name…"
             class="border rounded px-2 py-1 text-sm bg-white w-48" />
      <button id="settings-btn" class="border rounded px-3 py-1 text-sm bg-white hover:bg-slate-50" title="DCF & Alert Settings">⚙ Settings</button>
      <button id="refresh" class="bg-slate-800 text-white text-sm px-3 py-1 rounded">Refresh</button>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="flex gap-1 border-b mb-4 flex-wrap">
    <button class="tab-btn px-3 py-2 text-sm font-medium border-b-2 border-blue-600" data-tab="sectors">By Sector</button>
    <button class="tab-btn px-3 py-2 text-sm font-medium border-b-2 border-transparent" data-tab="value">📊 Value</button>
    <button class="tab-btn px-3 py-2 text-sm font-medium border-b-2 border-transparent" data-tab="sentiment">💬 Sentiment</button>
    <button class="tab-btn px-3 py-2 text-sm font-medium border-b-2 border-transparent" data-tab="favorites">★ Favorites</button>
    <button class="tab-btn px-3 py-2 text-sm font-medium border-b-2 border-transparent" data-tab="all">All Stocks</button>
    <button class="tab-btn relative px-3 py-2 text-sm font-medium border-b-2 border-transparent" data-tab="alerts">
      🔔 Alerts
      <span id="alert-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center"></span>
    </button>
  </nav>

  <main id="content"></main>
</div>

<!-- Stock Detail Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-lg max-w-3xl w-full max-h-[90vh] overflow-auto">
    <div class="flex items-center justify-between p-4 border-b">
      <div>
        <h2 id="m-symbol" class="text-xl font-bold"></h2>
        <p id="m-name" class="text-sm text-slate-500"></p>
      </div>
      <button id="m-close" class="text-2xl px-2">&times;</button>
    </div>
    <div class="p-4">
      <div class="flex items-baseline gap-3 mb-1">
        <span id="m-price" class="text-3xl font-bold"></span>
        <span id="m-change" class="text-lg font-semibold"></span>
      </div>
      <div id="m-metrics"></div>
      <canvas id="m-chart" height="120"></canvas>
      <div class="mt-4 border-t pt-3">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500 mb-2">Latest News</p>
        <div id="m-news" class="text-sm">
          <p class="text-slate-400 text-sm py-3">Loading news…</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="hidden fixed inset-0 bg-black/50 items-center justify-center p-4 z-50">
  <!-- populated by JS -->
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
